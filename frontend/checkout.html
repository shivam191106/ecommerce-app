<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — Aurelia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
</head>

<body>

    <nav class="navbar">
        <div class="container navbar-inner">
            <a href="index.html" class="navbar-logo">Aurelia</a>
            <div class="navbar-links">
                <a href="index.html">Shop</a>
                <a href="#">New Arrivals</a>
                <a href="#">About</a>
            </div>
            <div class="navbar-icons">
                <button class="hamburger-btn" id="hamburger-btn">☰</button>
                <div id="nav-auth-slot"></div>
            </div>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html">Shop</a>
        <a href="#">New Arrivals</a>
        <a href="#">About</a>
        <a href="login.html">Login</a>
    </div>

    <main class="container" style="padding-block: var(--space-xl) var(--space-2xl);">
        <h1 style="margin-bottom: var(--space-lg);">Checkout</h1>

        <div id="form-error" class="form-error"></div>

        <div class="checkout-layout">
            <form id="checkout-form">
                <h3 style="margin-bottom: var(--space-md);">Shipping Address</h3>

                <div class="form-group">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-input" required />
                </div>

                <div class="form-group">
                    <label for="addressLine" class="form-label">Address</label>
                    <input type="text" id="addressLine" class="form-input" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city" class="form-label">City</label>
                        <input type="text" id="city" class="form-input" required />
                    </div>
                    <div class="form-group">
                        <label for="postalCode" class="form-label">Postal Code</label>
                        <input type="text" id="postalCode" class="form-input" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="country" class="form-label">Country</label>
                    <input type="text" id="country" class="form-input" required value="India" />
                </div>

                <button type="submit" id="checkout-submit-btn" class="btn btn-primary btn-block">Place Order</button>
            </form>

            <div class="card">
                <h3 style="margin-bottom: var(--space-md);">Order Summary</h3>
                <div id="checkout-summary-items"></div>
                <div class="checkout-total-row">
                    <span>Total</span>
                    <span id="checkout-total">₹0</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-drawer-header">
            <h3>Your Cart</h3>
            <button class="cart-drawer-close" id="cart-close-btn">✕</button>
        </div>
        <div class="cart-drawer-items" id="cart-drawer-items"></div>
        <div class="cart-drawer-footer" id="cart-drawer-footer"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>

</body>

</html>
